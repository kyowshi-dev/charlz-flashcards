<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <h1>Charlz Flashcards</h1>

      <div id="card-display" class="card-display">
        <div class="card-inner" id="card-inner">
          <div class="card-front" id="card-question">Loading...</div>
          <div class="card-back" id="card-answer">Loading...</div>
        </div>
      </div>

      <div class="controls">
        <button id="previous-button">Previous</button>
        <button id="flip-button">Flip</button>
        <button id="next-button">Next</button>
      </div>

      <div class="status">
        card <span id="current-index">0</span> of
        <span id="total-cards">0</span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
